<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusBoard — Dashboard</title>
  <link rel="stylesheet" href="static/css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="static/js/firebase-config.js"></script>
</head>
<body class="page">

  <!-- Header -->
  <header class="header">
    <span class="header__logo">📋 FocusBoard</span>
    <div class="header__actions">
      <span class="header__meta" id="week-label"></span>
      <span id="health-score" style="font-size:13px; font-weight:500;"></span>
      <button class="btn btn--default" id="btn-focus">⚡ Focus</button>
      <a href="admin.html" class="btn btn--ghost" id="btn-admin" style="display:none;">⚙️ Admin</a>
    </div>
  </header>

  <main class="page__body container--wide">

    <!-- Announcement Banner -->
    <div class="banner" id="announcement-banner" style="display:none;"></div>

    <!-- Milestone Timeline -->
    <section id="timeline-section" class="mb-24">
      <div class="flex-between mb-8">
        <span class="section-title">📅 Milestones</span>
        <span class="text-muted" id="timeline-range" style="font-size:11px;"></span>
      </div>
      <div class="timeline">
        <div class="timeline__track" id="timeline-track">
          <!-- Today's vertical line -->
          <div class="timeline__today" id="timeline-today"></div>
          <!-- Milestone dots (generated by JS) -->
        </div>
        <div class="timeline__labels">
          <span id="label-start"></span>
          <span id="label-mid"></span>
          <span id="label-end"></span>
        </div>
        <!-- Project color legend -->
        <div id="timeline-legend" style="display:flex; flex-wrap:wrap; gap:12px; margin-top:10px;"></div>
      </div>
      <!-- Milestone list (always visible) -->
      <div id="milestone-list"></div>
    </section>

    <!-- Summary Bar -->
    <div class="flex-between mb-16" id="summary-bar">
      <div class="flex gap-8">
        <span class="badge badge--red"   id="count-blocked"></span>
        <span class="badge badge--yellow" id="count-at-risk"></span>
        <span class="badge badge--green"  id="count-on-track"></span>
        <span class="badge badge--gray"   id="count-pending"></span>
      </div>
      <span class="text-muted" style="font-size:12px;" id="submitted-count"></span>
    </div>

    <!-- Card Grid -->
    <div class="card-grid" id="card-grid">
      <!-- Cards generated by dashboard.js -->
    </div>

  </main>

  <script src="static/js/utils.js"></script>
  <script src="static/js/dashboard.js"></script>
</body>
</html>
